<div class="grid">
  <section class="renderContainer">
    @if (currentRawModel()) {
    <app-camera-controls> </app-camera-controls>
    <app-outdoor-editor-renderer
      #renderer
      class="render"
      [rawModel]="currentRawModel()"
      [lineForEdit]="lineForEdit()"
      [revertLastPointCommand]="revertLastPointCommand()"></app-outdoor-editor-renderer>
    } @else {
    <app-loading-image class="render"> </app-loading-image>
    }
  </section>
  <section class="legend">
    <div class="actions">
      <button class="button action-button" (click)="openSaveModal()">Save Line</button>
      <button class="button action-button" (click)="sendRevertLastPointSignal()">Revert Last Point</button>
      <button class="button action-button action-end" [routerLink]="['/', 'bloc', bloc.id]">back</button>
    </div>
    <div class="legend-list"></div>
  </section>
</div>

<app-modal #modal (closed)="closeModal($event)"> </app-modal>
