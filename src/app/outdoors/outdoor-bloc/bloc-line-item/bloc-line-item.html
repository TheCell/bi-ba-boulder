<li
  [class.selected]="isSelected()"
  class="item"
  role="button"
  tabindex="0"
  (click)="selectLine()"
  (keypress)="selectLine()"
  [id]="line().id">
  <div class="item-row">
    <span class="identifier">{{ line().identifier }}</span>
    <span class="name">{{ line().name }}</span>
    <span class="fontGrade">{{ line().fontGrade ?? undefined | appFontGradePipe }}</span>
  </div>
  <span class="item-row description hidden-on-mobile">{{ line().description }}</span>
</li>
