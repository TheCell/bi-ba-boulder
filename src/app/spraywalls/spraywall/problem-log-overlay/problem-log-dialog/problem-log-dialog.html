<h2>Save Problem Log</h2>

<form (ngSubmit)="onSubmit()" [class.disabled]="saveForm().disabled()">
    <div class="form-group form-input" [class.disabled]="saveForm.isSent().disabled()">
        <input id="isSent" type="checkbox" [formField]="saveForm.isSent" />
        <label for="isSent" class="group-label">mark completed</label>
    </div>
    
    <div class="form-group form-input" [class.disabled]="saveForm.isProject().disabled()">
        <input id="isProject" type="checkbox" [formField]="saveForm.isProject" />
        <label for="isProject" class="group-label">mark as project</label>
    </div>

    <div class="form-group form-input" [class.disabled]="saveForm.fontGrade().disabled()">
        <select id="grade" [formField]="saveForm.fontGrade">
            <option value="">?</option>
            <option value="7">3</option>
            <option value="10">4</option>
            <option value="11">4+</option>
            <option value="13">5</option>
            <option value="14">5+</option>
            <option value="16">6A</option>
            <option value="17">6A+</option>
            <option value="19">6B</option>
            <option value="20">6B+</option>
            <option value="22">6C</option>
            <option value="23">6C+</option>
            <option value="25">7A</option>
            <option value="26">7A+</option>
            <option value="28">7B</option>
            <option value="29">7B+</option>
            <option value="31">7C</option>
            <option value="32">7C+</option>
            <option value="34">8A</option>
            <option value="35">8A+</option>
            <option value="37">8B</option>
            <option value="38">8B+</option>
            <option value="40">8C</option>
            <option value="41">8C+</option>
            <option value="43">9A</option>
            <option value="44">9A+</option>
            <option value="46">9B</option>
            <option value="47">9B+</option>
            <option value="49">9C</option>
            <option value="50">9C+</option>
        </select>
        <label for="grade" class="group-label">Grade</label>
    </div>

    <div class="form-group form-input">
    <!-- upgrade to angular version 22 first before searching a solution -->
    <!-- casting strings because undefined is not possible is ridiculous -->
    <!-- <app-star-rating [formField]="saveForm.rating"></app-star-rating> -->
    <!-- <div class="form-group form-input" [class.disabled]="saveForm.rating().disabled()"> -->
        <input id="rating" type="text" value="coming soon" readonly />
        <label for="rating" class="group-label">Rating</label>
    </div>
    
    <div class="form-group form-action">
        <button type="submit" class="button"
            [class.disabled]="isLoading || saveForm().invalid() || saveForm().disabled()"
            [disabled]="isLoading || saveForm().invalid() || saveForm().disabled()">
            @if (isLoading) {
                <span class="loading-spinner"><app-icon [icon]="'loading'"></app-icon></span>
            } @else {
                Save
            }
        </button>
    </div>
</form>
