name: Build and deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["deploy"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # default value when not using subfolders
  # BUILD_PATH: subfolder

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.BUILD_PATH }}

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: ${{ env.BUILD_PATH }}

  test-backend:
    name: Test .NET Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend_net/BiBaBoulder/Thecell.Bibaboulder.BiBaBoulder.slnx

      - name: Build
        run: dotnet build backend_net/BiBaBoulder/Thecell.Bibaboulder.BiBaBoulder.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test backend_net/TheCell.Bibaboulder.Unittests/TheCell.Bibaboulder.Unittests.csproj --configuration Release --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test backend_net/TheCell.Bibaboulder.Integrationtests/TheCell.Bibaboulder.Integrationtests.csproj --configuration Release --no-build --verbosity normal

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build Frontend
        run: npm run buildpipeline
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist/bibaboulder/browser
          name: Frontend_Build

  pack_backend:
    name: Pack PHP backend (legacy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: ["8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Backend_Build
          path: ${{ env.BUILD_PATH }}/backend

  build-dotnet-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend_net/BiBaBoulder/Thecell.Bibaboulder.BiBaBoulder.slnx

      - name: Build solution
        run: dotnet build backend_net/BiBaBoulder/Thecell.Bibaboulder.BiBaBoulder.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend_net/BiBaBoulder/Thecell.Bibaboulder.BiBaBoulder.csproj --configuration Release --output ./publish --no-build

      - name: Copy web.config to publish directory
        run: cp backend_net/BiBaBoulder/web.config ./publish/

      - name: Upload .NET artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotNet_Backend_Build
          path: ./publish

  run-migrations:
    name: Run EF Core Migrations
    runs-on: ubuntu-latest
    needs: [build-dotnet-backend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        run: dotnet ef database update --project backend_net/Migrations/Thecell.Bibaboulder.Migrations.csproj --startup-project backend_net/BiBaBoulder/Thecell.Bibaboulder.BiBaBoulder.csproj --connection "${{ secrets.MSSQL_CONNECTION_STRING }}"
        env:
          ASPNETCORE_ENVIRONMENT: Production


  backend-deploy:
    name: Deploy PHP Backend to FTP (legacy)
    runs-on: ubuntu-latest
    permissions:
        contents: write

    needs: [pack_backend, build]

    steps:
    - name: Download Backend artifact
      uses: actions/download-artifact@v4
      with:
        name: Backend_Build

    # - name: Create .env file
    #   run: |
    #     echo "APP_ENV=prod" > .env

    - name: Create .env.local.php file
      run: |
        echo "<?php" >> .env.local.php
        echo "// This file is generated in the deploy script " >> .env.local.php
        echo "" >> .env.local.php
        echo "return array (" >> .env.local.php
        echo "  'APP_ENV' => 'prod'," >> .env.local.php
        echo "  'SYMFONY_DOTENV_PATH' => './.env'," >> .env.local.php
        echo "  'APP_SECRET' => '${{ secrets.APP_SECRET }}'," >> .env.local.php
        echo "  'DATABASE_URL' => '${{ secrets.DATABASE_URL }}'," >> .env.local.php
        echo "  'TESTVAR' => '${{ secrets.TESTVAR }}'," >> .env.local.php
        echo "  'SENDEREMAIL' => '${{ secrets.SENDEREMAIL }}'," >> .env.local.php
        echo "  'ADMINMAIL' => '${{ secrets.ADMINMAIL }}'," >> .env.local.php
        echo "  'JWT_SECRET_KEY' => '%kernel.project_dir%/config/jwt/private.pem'," >> .env.local.php
        echo "  'JWT_PUBLIC_KEY' => '%kernel.project_dir%/config/jwt/public.pem'," >> .env.local.php
        echo "  'JWT_PASSPHRASE' => '${{ secrets.JWT_PASSPHRASE }}'," >> .env.local.php
        echo "  'CORS_ALLOW_ORIGIN' => '^https?://(bibaboulder.thecell.eu|boulderapi.thecell.eu|localhost|127\.0\.0\.1)(:[0-9]+)?$'," >> .env.local.php
        echo ");" >> .env.local.php
        echo "?>" >> .env.local.php

    - run: ls -R

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: boulderapi.thecell.eu
        username: ${{ secrets.API_FTPUSER }}
        password: ${{ secrets.API_FTPPASSWORD }}
        protocol: ftp
        port: 21
        local-dir: ./

  dotnet-backend-deploy:
    name: Deploy .NET Backend to FTP
    runs-on: ubuntu-latest
    permissions:
        contents: write

    needs: [build-dotnet-backend, run-migrations]

    steps:
    - name: Checkout (for fileshare directory)
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          fileshare

    - name: Download .NET Backend artifact
      uses: actions/download-artifact@v4
      with:
        name: DotNet_Backend_Build
        path: ./backend

    - name: Create appsettings.Production.json with secrets
      run: |
        cat > ./backend/appsettings.Production.json << 'EOF'
        {
          "Logging": {
            "LogLevel": {
              "Default": "Information",
              "Microsoft.AspNetCore": "Warning",
              "Microsoft.EntityFrameworkCore": "Warning"
            }
          },
          "ApiUrl": "https://api.bibaboulder.org",
          "ConnectionStrings": {
            "BiBaBoulderDatabase": "${{ secrets.MSSQL_CONNECTION_STRING }}"
          },
          "Oidc": {
            "Authority": "https://accounts.google.com",
            "ClientId": "${{ secrets.OIDC_CLIENT_ID }}",
            "ClientSecret": "${{ secrets.OIDC_CLIENT_SECRET }}"
          },
          "FrontendOrigin": "https://bibaboulder.org",
          "FileStorageBasePath": "C:\\inetpub\\vhosts\\api.bibaboulder.org\\fileshare",
          "Email": {
            "Host": "${{ secrets.SMTP_HOST }}",
            "Port": ${{ secrets.SMTP_PORT }},
            "UseSsl": false,
            "UseStartTls": true,
            "Username": "${{ secrets.SMTP_USERNAME }}",
            "Password": "${{ secrets.SMTP_PASSWORD }}",
            "FromAddress": "noreply@bibaboulder.org",
            "FromName": "Bi Ba Boulder"
          },
          "AllowedHosts": "*"
        }
        EOF

    - run: ls -R

    - name: Deploy backend to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: api.bibaboulder.org
        username: ${{ secrets.FTP_USER_BACKEND }}
        password: ${{ secrets.FTP_PASSWORD_BACKEND }}
        protocol: ftp
        port: 21
        local-dir: ./backend/
        
    - name: Deploy fileshare to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: api.bibaboulder.org
        username: ${{ secrets.FTP_USER_BACKEND }}
        password: ${{ secrets.FTP_PASSWORD_BACKEND }}
        protocol: ftp
        port: 21
        local-dir: ./fileshare/
        server-dir: /fileshare/

  web-deploy:
    name: Deploy Frontend to FTP
    runs-on: ubuntu-latest
    permissions:
        contents: write

    needs: [build, dotnet-backend-deploy]

    steps:
    - name: Download Frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: Frontend_Build

    - name: extract artifact for deployment
    # x – instructs tar to extract the files from the zipped file
    # v – means verbose, or to list out the files it’s extracting
    # f – tells tar the filename you want it to work on
      run: tar -xvf artifact.tar -C ./

    - run: rm *.tar

    - run: ls -R

    - name: Sync files to bibaboulder.org
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: bibaboulder.org
        username: ${{ secrets.FTP_USER_FRONTEND }}
        password: ${{ secrets.FTP_PASSWORD_FRONTEND }}
        protocol: ftp
        port: 21
        local-dir: ./
